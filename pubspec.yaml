name: mploya
description: "mploya - Plataforma de empleo impulsada por IA"
publish_to: 'none'
version: 1.0.10+10

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Backend - Supabase
  supabase_flutter: ^2.9.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  firebase_crashlytics: ^4.3.5

  # Environment
  flutter_dotenv: ^5.2.1

  # Charts
  fl_chart: ^0.69.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

  # Auth
  google_sign_in: ^6.2.2

  # Map
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  geolocator: ^14.0.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  crypto: ^3.0.3
  http: ^1.2.2
  mime: ^2.0.0
  image: ^4.3.0
  file_picker: ^8.1.7
  visibility_detector: ^0.4.0+2
  permission_handler: ^11.3.1
  app_links: ^6.3.3

  # Camera & Video (cross-platform)
  camera: ^0.11.0+2
  video_player: ^2.9.2

  # AI
  google_generative_ai: ^0.4.6

  # Persistencia local
  shared_preferences: ^2.3.4

  # Onboarding tour interactivo
  tutorial_coach_mark: ^1.3.3

  # Payments
  flutter_stripe: ^12.6.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  webview_flutter: ^4.13.1

  # Video calls
  agora_rtc_engine: ^6.5.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/empty_states/
    - assets/branding/
    - assets/icons/
    - assets/animations/
    - assets/videos/
