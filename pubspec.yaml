name: mploya
description: A professional social network for work and career networking.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  intl: ^0.20.2
  google_fonts: ^6.2.1
  video_player: ^2.9.1
  supabase_flutter: ^2.12.2
  crypto: ^3.0.3
  image_picker: ^1.1.2
  camera: ^0.12.0+1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  visibility_detector: ^0.4.0+2
  flutter_dotenv: ^5.2.1
  shared_preferences: ^2.3.3
  flutter_riverpod: ^3.3.1
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  firebase_crashlytics: ^5.1.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  file_picker: ^8.1.7
  path_provider: ^2.1.4
  mime: ^2.0.0
  jitsi_meet_flutter_sdk: ^11.0.0
  app_tracking_transparency: ^2.0.6
  share_plus: ^10.1.4
  app_links: ^6.3.3
  http: ^1.2.2
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/.env
    - assets/images/
    - assets/images/empty_states/
    - assets/videos/
    - assets/branding/
