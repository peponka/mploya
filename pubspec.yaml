name: mploya
description: "mploya - Plataforma de empleo impulsada por IA"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Backend - Supabase
  supabase_flutter: ^2.9.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  firebase_crashlytics: ^4.3.5

  # Environment
  flutter_dotenv: ^5.2.1

  # Data Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

  # Auth
  google_sign_in: ^6.2.2

  # Map
  flutter_map: ^8.1.1
  latlong2: ^0.9.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true

  assets:
    - assets/.env
    - assets/images/
    - assets/icons/
    - assets/animations/
