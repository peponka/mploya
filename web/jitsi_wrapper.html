<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://meet.jit.si/external_api.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #meet { width: 100%; height: 100%; overflow: hidden; background: #000; }
  </style>
</head>
<body>
  <div id="meet"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const room = params.get('room') || 'mploya-meeting';
    const audioMuted = params.get('audioMuted') === 'true';
    const videoMuted = params.get('videoMuted') === 'true';
    const displayName = params.get('name') || 'Usuario Mploya';

    const api = new JitsiMeetExternalAPI('meet.jit.si', {
      roomName: room,
      parentNode: document.querySelector('#meet'),
      width: '100%',
      height: '100%',
      userInfo: {
        displayName: displayName,
      },
      configOverwrite: {
        startWithAudioMuted: audioMuted,
        startWithVideoMuted: videoMuted,
        prejoinPageEnabled: false,
        disableDeepLinking: true,
        enableClosePage: false,
      },
      interfaceConfigOverwrite: {
        SHOW_JITSI_WATERMARK: false,
        SHOW_WATERMARK_FOR_GUESTS: false,
        SHOW_BRAND_WATERMARK: false,
        SHOW_POWERED_BY: false,
        DEFAULT_BACKGROUND: '#1A1A2E',
        TOOLBAR_BUTTONS: [
          'microphone', 'camera', 'desktop', 'chat',
          'raisehand', 'participants-pane', 'tileview',
          'select-background', 'hangup',
        ],
      },
    });

    // When user hangs up or meeting ends, notify parent
    api.addEventListener('readyToClose', function() {
      window.parent.postMessage('jitsi-close', '*');
    });

    api.addEventListener('videoConferenceLeft', function() {
      window.parent.postMessage('jitsi-close', '*');
    });
  </script>
</body>
</html>
