<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="La red profesional donde tu Video-CV vale más que el papel">
  <meta name="theme-color" content="#F97316">

  <!-- Open Graph -->
  <meta property="og:title" content="mploya.ai — Empleo en video">
  <meta property="og:description" content="La red profesional donde tu Video-CV vale más que el papel">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mploya">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>

  <title>mploya.ai — Empleo en video</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* El plugin de video usa un <video> HTML real que el ClipRRect de Flutter
       no recorta en web. Lo redondeamos por CSS para el feed estilo TikTok web. */
    video {
      border-radius: 16px;
      /* El <video> HTML captura el click antes que Flutter; lo desactivamos
         para que el tap llegue a la capa de gestos (play/pausa estilo TikTok). */
      pointer-events: none;
    }
    /* El platform-view del video también se "come" el click: lo dejamos pasar a
       Flutter. La videollamada (Jitsi) usa <iframe>, que sí debe seguir clickeable. */
    flt-platform-view,
    flt-platform-view-slot {
      pointer-events: none;
    }
    iframe {
      pointer-events: auto;
    }
    /* Fallback: si el <video> va dentro de un platform view, redondeamos el host. */
    flt-platform-view {
      border-radius: 16px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!-- Jitsi close handler: auto-navigate back when call ends -->
  <script>
    window.addEventListener('message', function(e) {
      if (e.data === 'jitsi-close') {
        window.location.hash = '#/home';
      }
    });
  </script>

  <!-- Agora Web SDK — requerido para videollamadas en web -->
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.23.1.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
